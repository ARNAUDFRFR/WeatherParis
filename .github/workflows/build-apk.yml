name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Make Gradle executable
      run: chmod +x gradlew

    - name: Generate and Commit Keystore if missing
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ ! -f app/debug.keystore ]; then
          echo "Keystore not found. Generating a persistent debug.keystore..."
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add app/debug.keystore
          git commit -m "Generate persistent debug keystore [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
        else
          echo "Keystore already exists."
        fi

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug > build.log 2>&1 || {
          echo "=== BUILD FAILED ==="
          cat build.log
          while IFS= read -r line; do
            if [[ "$line" =~ ^(e:|w:)\ / ]] || [[ "$line" =~ ^FAILURE: ]] || [[ "$line" =~ ^\*\ What\ went\ wrong: ]] || [[ "$line" =~ "Compilation error" ]] || [[ "$line" =~ "error:" ]]; then
              echo "::error::$line"
            fi
          done < build.log
          exit 1
        }

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="v1.0.${{ github.run_number }}"
        gh release create "$TAG_NAME" app/build/outputs/apk/debug/app-debug.apk \
          --title "Release $TAG_NAME" \
          --notes "Automated build of WeatherParis APK."
